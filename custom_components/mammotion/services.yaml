svg_delete:
  fields:
    entity_id:
      required: true
      selector:
        entity:
          integration: mammotion
    device_hash:
      required: true
      example: 987654321
      selector:
        number:
          mode: box
    area_hash:
      required: true
      example: 123456789
      selector:
        number:
          mode: box
