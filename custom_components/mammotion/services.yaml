      default: 0.0
      selector:
        number:
          min: -3.14159
          max: 3.14159
          step: 0.001
          mode: box
          unit_of_measurement: "rad"
    base_width_m:
      required: false
      default: 2.5
      selector:
        number:
          min: 0.1
          max: 20.0
          step: 0.1
          mode: box
          unit_of_measurement: "m"
    base_height_m:
      required: false
