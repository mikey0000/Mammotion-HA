      - conditions:
          - condition: template
            value_template: >
              {% set e = turnaround_mode_select_entity | string | trim %}
              {% set desired = turnaround_mode_option | string %}
              {{ e | length > 0 and states(e) | string != desired }}
        sequence:
          - service: select.select_option
            target:
              entity_id: "{{ turnaround_mode_select_entity }}"
            data:
              option: "{{ turnaround_mode_option }}"
            continue_on_error: true
  - alias: "Set wildlife safety before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = wildlife_safety_select_entity | string | trim %}
              {% set desired = wildlife_safety_option | string %}
              {{ e | length > 0 and states(e) | string != desired }}
        sequence:
          - service: select.select_option
            target:
              entity_id: "{{ wildlife_safety_select_entity }}"
            data:
              option: "{{ wildlife_safety_option }}"
            continue_on_error: true
  - alias: "Ensure auto lighting/night light is on before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = night_light_switch_entity | string | trim %}
              {{ e | length > 0 and not is_state(e, 'on') }}
        sequence:
          - service: switch.turn_on
            target:
              entity_id: "{{ night_light_switch_entity }}"
            continue_on_error: true
  - alias: "Ensure rain detection during mow is on before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = rain_detection_during_mow_switch_entity | string | trim %}
              {{ e | length > 0 and not is_state(e, 'on') }}
        sequence:
          - service: switch.turn_on
            target:
              entity_id: "{{ rain_detection_during_mow_switch_entity }}"
            continue_on_error: true
  - alias: "Ensure mower rain detection is on before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = rain_detection_mower_switch_entity | string | trim %}
              {{ e | length > 0 and not is_state(e, 'on') }}
        sequence:
          - service: switch.turn_on
            target:
              entity_id: "{{ rain_detection_mower_switch_entity }}"
            continue_on_error: true
  - alias: "Start mowing Zone A"
    service: lawn_mower.start_mowing
    target:
      entity_id: !input mower_entity

  - alias: "One-time pause recovery after Zone A start"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ post_start_pause_resume_window | int > 0 }}"
        sequence:
          - wait_for_trigger:
              - platform: state
                entity_id: !input mower_entity
                to: "paused"
                id: post_start_paused
              - platform: state
                entity_id: !input weather_entity
                to:
                  - "rainy"
                  - "pouring"
                  - "lightning-rainy"
                  - "hail"
                  - "snowy-rainy"
                  - "exceptional"
                id: rain
            timeout:
              seconds: "{{ post_start_pause_resume_window | int }}"
            continue_on_timeout: true
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is not none and wait.trigger.id == 'post_start_paused' }}"
                sequence:
                  - service: lawn_mower.start_mowing
                    target:
                      entity_id: !input mower_entity
                    continue_on_error: true
                  - service: notify.persistent_notification
                    data:
                      title: "▶️ {{ mower_display_name }} resumed — Zone A"
                      message: >
                        The mower paused shortly after starting {{ zone_a_name }}.
                        A one-time continue command was sent.
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is not none and wait.trigger.id == 'rain' }}"
                sequence:
                  - service: lawn_mower.dock
                    target:
                      entity_id: !input mower_entity
                  - service: input_datetime.set_datetime
                    target:
                      entity_id: !input rain_last_seen
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                  - service: notify.persistent_notification
                    data:
                      title: "🌧️ {{ mower_display_name }} recalled during Zone A startup"
                      message: >
                        Rain was detected during startup for {{ zone_a_name }}.
                        The mower was sent to dock and the zone tracker was not advanced.
                  - stop: "Rain detected during startup recovery window"

  - alias: "Verify Zone A actually started"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set activity_entity = mower_activity_mode_sensor | string | trim %}
              {% set progress_entity = mower_progress_sensor | string | trim %}
              {% set time_left_entity = mower_time_left_sensor | string | trim %}
              {% set activity = states(activity_entity) | upper if activity_entity | length > 0 else '' %}
              {% set mower = states(mower_entity) | lower %}
              {% set progress = states(progress_entity) | float(0) if progress_entity | length > 0 else 0 %}
              {% set time_left = states(time_left_entity) | float(0) if time_left_entity | length > 0 else 0 %}
              {% set started =
                mower in ['mowing']
                or activity in ['MODE_WORKING', 'MODE_MOWING', 'MODE_CUTTING', 'MODE_GOING_TO_WORK']
                or progress > 1
                or time_left > 0
              %}
              {{ not started }}
        sequence:
          - service: lawn_mower.dock
            target:
              entity_id: !input mower_entity
            continue_on_error: true
          - service: input_boolean.turn_off
            target:
              entity_id: !input scheduler_in_progress_helper
            continue_on_error: true
          - service: notify.persistent_notification
            data:
              title: "⚠️ {{ mower_display_name }} failed to start — {{ zone_a_name }}"
              message: >
                The scheduler sent the start command, but the mower never entered a mowing/working state.
                The zone tracker was not advanced.
                Mower state: {{ states(mower_entity) }}
                Activity: {{ states(mower_activity_mode_sensor) if mower_activity_mode_sensor | string | trim | length > 0 else 'not configured' }}
                Progress: {{ states(mower_progress_sensor) if mower_progress_sensor | string | trim | length > 0 else 'not configured' }}
                Time left: {{ states(mower_time_left_sensor) if mower_time_left_sensor | string | trim | length > 0 else 'not configured' }}
          - stop: "Mower failed to start Zone A"

  - alias: "Wait for Zone A to complete, timeout, or rain to interrupt"
    wait_for_trigger:
      - platform: state
        entity_id: !input weather_entity
        to:
          - "rainy"
          - "pouring"
          - "lightning-rainy"
          - "hail"
          - "snowy-rainy"
          - "exceptional"
        id: rain
      - platform: template
        id: complete
        value_template: >
          {% set progress_entity = mower_progress_sensor | string | trim %}
          {% set time_left_entity = mower_time_left_sensor | string | trim %}
          {% set task_entity = mower_task_status_sensor | string | trim %}
          {% set activity_entity = mower_activity_mode_sensor | string | trim %}
          {% set progress = states(progress_entity) | float(-1) if progress_entity | length > 0 else -1 %}
          {% set time_left = states(time_left_entity) | float(999) if time_left_entity | length > 0 else 999 %}
          {% set task = states(task_entity) | upper if task_entity | length > 0 else '' %}
          {% set activity = states(activity_entity) | upper if activity_entity | length > 0 else '' %}
          {% set mower = states(mower_entity) | lower %}
          {{
            task == 'COMPLETE'
            or progress >= 99
            or (time_left <= 0 and mower in ['docked', 'idle'] and progress >= 90)
          }}
      - platform: template
        id: resume_ready
        value_template: >
          {% set progress_entity = mower_progress_sensor | string | trim %}
          {% set time_left_entity = mower_time_left_sensor | string | trim %}
          {% set task_entity = mower_task_status_sensor | string | trim %}
          {% set activity_entity = mower_activity_mode_sensor | string | trim %}
          {% set charging_entity = mower_charging_binary_sensor | string | trim %}
          {% set battery_entity = mower_battery_sensor | string | trim %}
          {% set progress = states(progress_entity) | float(0) if progress_entity | length > 0 else 0 %}
          {% set time_left = states(time_left_entity) | float(0) if time_left_entity | length > 0 else 0 %}
          {% set task = states(task_entity) | upper if task_entity | length > 0 else '' %}
          {% set activity = states(activity_entity) | upper if activity_entity | length > 0 else '' %}
          {% set mower = states(mower_entity) | lower %}
          {% set charging = charging_entity | length > 0 and is_state(charging_entity, 'on') %}
          {% set battery = states(battery_entity) | float(100) if battery_entity | length > 0 else 100 %}
          {{
            mower == 'paused'
            and charging
            and activity in ['MODE_PAUSE', 'MODE_PAUSED', '']
            and progress > 1
            and progress < 98
            and time_left > 0
            and battery >= (resume_after_charge_battery_threshold | int(80))
            and task in ['MOWING', 'WAITING', '']
          }}
    timeout:
      minutes: "{{ zone_duration | int }}"
    continue_on_timeout: true

  - alias: "Resume Zone A after charging pause if ready"
    choose:
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger is not none and wait.trigger.id == 'resume_ready' }}"
        sequence:
          - service: notify.persistent_notification
            data:
              title: "▶️ {{ mower_display_name }} resuming after charge — {{ zone_a_name }}"
              message: >
                The mower is paused on the charger with an unfinished job.
                Progress: {{ states(mower_progress_sensor) if mower_progress_sensor | string | trim | length > 0 else 'not configured' }}
                Time left: {{ states(mower_time_left_sensor) if mower_time_left_sensor | string | trim | length > 0 else 'not configured' }}
                Battery: {{ states(mower_battery_sensor) if mower_battery_sensor | string | trim | length > 0 else 'not configured' }}
                Sending continue/start command for the same selected area.
          - service: lawn_mower.start_mowing
            target:
              entity_id: !input mower_entity
            continue_on_error: true
          - delay:
              seconds: 90
          - wait_for_trigger:
              - platform: state
                entity_id: !input weather_entity
                to:
                  - "rainy"
                  - "pouring"
                  - "lightning-rainy"
                  - "hail"
                  - "snowy-rainy"
                  - "exceptional"
                id: rain
              - platform: template
                id: complete
                value_template: >
                  {% set progress_entity = mower_progress_sensor | string | trim %}
                  {% set time_left_entity = mower_time_left_sensor | string | trim %}
                  {% set task_entity = mower_task_status_sensor | string | trim %}
                  {% set progress = states(progress_entity) | float(-1) if progress_entity | length > 0 else -1 %}
                  {% set time_left = states(time_left_entity) | float(999) if time_left_entity | length > 0 else 999 %}
                  {% set task = states(task_entity) | upper if task_entity | length > 0 else '' %}
                  {% set mower = states(mower_entity) | lower %}
                  {{
                    task == 'COMPLETE'
                    or progress >= 99
                    or (time_left <= 0 and mower in ['docked', 'idle'] and progress >= 90)
                  }}
            timeout:
              minutes: "{{ zone_duration | int }}"
            continue_on_timeout: true

  - alias: "Return mower to dock after Zone A"
    service: lawn_mower.dock
    target:
      entity_id: !input mower_entity

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger is not none and wait.trigger.id == 'complete' }}"
        sequence:
          - service: input_number.set_value
            target:
              entity_id: !input zone_tracker
            data:
              value: "{{ zone_a | int }}"
          - service: input_datetime.set_datetime
            target:
              entity_id: !input last_run_tracker
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - service: notify.persistent_notification
            data:
              title: "✅ {{ mower_display_name }} finished — {{ zone_a_name }}"
              message: >
                Zone {{ zone_a }} ({{ zone_a_name }}) completed.
                Zone tracker advanced to {{ zone_a }}.
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger is none }}"
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input scheduler_in_progress_helper
            continue_on_error: true
          - service: notify.persistent_notification
            data:
              title: "⚠️ {{ mower_display_name }} timed out — {{ zone_a_name }} not counted"
              message: >
                The mower did not report completion before the zone timeout.
                Zone {{ zone_a }} was not counted complete and the zone tracker stays at {{ current_zone }}.
                Mower state: {{ states(mower_entity) }}
                Activity: {{ states(mower_activity_mode_sensor) if mower_activity_mode_sensor | string | trim | length > 0 else 'not configured' }}
                Progress: {{ states(mower_progress_sensor) if mower_progress_sensor | string | trim | length > 0 else 'not configured' }}
                Time left: {{ states(mower_time_left_sensor) if mower_time_left_sensor | string | trim | length > 0 else 'not configured' }}
          - stop: "Zone A timed out without completion"
      - conditions:
          - condition: template
            value_template: "{{ wait.trigger is not none and wait.trigger.id == 'rain' }}"
        sequence:
          - service: input_datetime.set_datetime
            target:
              entity_id: !input rain_last_seen
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - service: notify.persistent_notification
            data:
              title: "🌧️ {{ mower_display_name }} recalled mid-mow — Zone A"
              message: >
                Rain detected while mowing {{ zone_a_name }}. The mower was sent to dock.
                Zone tracker stays at {{ current_zone }}.
                A 6-hour dry-out delay is now active.

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ effective_zones_per_session | int >= 2 }}"
        sequence:
          - alias: "Rest period between Zone A and Zone B"
            delay:
              minutes: "{{ inter_zone_rest | int }}"

          - choose:
              - conditions:
                  - condition: template
                    alias: "Still clear to mow Zone B"
                    value_template: >
                      {{ not (states(weather_entity) in ['rainy', 'pouring', 'lightning-rainy', 'hail', 'snowy-rainy', 'exceptional']) }}
                sequence:
                  - alias: "Turn off all active area switches before Zone B"
                    service: switch.turn_off
                    target:
                      entity_id: >
                        {{ [sw1, sw2, sw3, sw4, sw5, sw6][:zone_mod | int(6)] | reject('eq', '') | list }}
                  - delay:
                      seconds: 6
                  - alias: "Enable only Zone B switch"
                    service: switch.turn_on
                    target:
                      entity_id: "{{ zone_b_switch }}"
                  - delay:
                      seconds: 9
                  # ── Apply Mammotion integration settings before Zone B only if needed ────────────
                  - alias: "Set blade height before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = blade_height_number_entity | string | trim %}
                              {% set current = states(e) | float(none) if e | length > 0 else none %}
                              {% set desired = mammotion_blade_height | float %}
                              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
                        sequence:
                          - service: number.set_value
                            target:
                              entity_id: "{{ blade_height_number_entity }}"
                            data:
                              value: "{{ mammotion_blade_height | int }}"
                            continue_on_error: true
                  - alias: "Set working speed before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = working_speed_number_entity | string | trim %}
                              {% set current = states(e) | float(none) if e | length > 0 else none %}
                              {% set desired = mammotion_working_speed | float %}
                              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
                        sequence:
                          - service: number.set_value
                            target:
                              entity_id: "{{ working_speed_number_entity }}"
                            data:
                              value: "{{ mammotion_working_speed | float }}"
                            continue_on_error: true
                  - alias: "Set cutting path angle before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = cutting_path_angle_number_entity | string | trim %}
                              {% set current = states(e) | float(none) if e | length > 0 else none %}
                              {% set desired = mammotion_cutting_path_angle | float %}
                              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
                        sequence:
                          - service: number.set_value
                            target:
                              entity_id: "{{ cutting_path_angle_number_entity }}"
                            data:
                              value: "{{ mammotion_cutting_path_angle | int }}"
                            continue_on_error: true
                  - alias: "Set crossing angle before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = crossing_angle_number_entity | string | trim %}
                              {% set current = states(e) | float(none) if e | length > 0 else none %}
                              {% set desired = mammotion_crossing_angle | float %}
                              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
                        sequence:
                          - service: number.set_value
                            target:
                              entity_id: "{{ crossing_angle_number_entity }}"
                            data:
                              value: "{{ mammotion_crossing_angle | int }}"
                            continue_on_error: true
                  - alias: "Set path spacing before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = path_spacing_number_entity | string | trim %}
                              {% set current = states(e) | float(none) if e | length > 0 else none %}
                              {% set desired = mammotion_path_spacing | float %}
                              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
                        sequence:
                          - service: number.set_value
                            target:
                              entity_id: "{{ path_spacing_number_entity }}"
                            data:
                              value: "{{ mammotion_path_spacing | int }}"
                            continue_on_error: true
                  - alias: "Set start progress before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = start_progress_number_entity | string | trim %}
                              {% set current = states(e) | float(none) if e | length > 0 else none %}
                              {% set desired = mammotion_start_progress | float %}
                              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
                        sequence:
                          - service: number.set_value
                            target:
                              entity_id: "{{ start_progress_number_entity }}"
                            data:
                              value: "{{ mammotion_start_progress | int }}"
                            continue_on_error: true
                  - alias: "Set cutter speed before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = cutter_speed_select_entity | string | trim %}
                              {% set desired = cutter_speed_option | string %}
                              {{ e | length > 0 and states(e) | string != desired }}
                        sequence:
                          - service: select.select_option
                            target:
                              entity_id: "{{ cutter_speed_select_entity }}"
                            data:
                              option: "{{ cutter_speed_option }}"
                            continue_on_error: true
                  - alias: "Set cutting path mode before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = cutting_path_mode_select_entity | string | trim %}
                              {% set desired = cutting_path_mode_option | string %}
                              {{ e | length > 0 and states(e) | string != desired }}
                        sequence:
                          - service: select.select_option
                            target:
                              entity_id: "{{ cutting_path_mode_select_entity }}"
                            data:
                              option: "{{ cutting_path_mode_option }}"
                            continue_on_error: true
                  - alias: "Set cutting path angle mode before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = cutting_path_angle_mode_select_entity | string | trim %}
                              {% set desired = cutting_path_angle_mode_option | string %}
                              {{ e | length > 0 and states(e) | string != desired }}
                        sequence:
                          - service: select.select_option
                            target:
                              entity_id: "{{ cutting_path_angle_mode_select_entity }}"
                            data:
                              option: "{{ cutting_path_angle_mode_option }}"
                            continue_on_error: true
                  - alias: "Set mow order before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = mow_order_select_entity | string | trim %}
                              {% set desired = mow_order_option | string %}
                              {{ e | length > 0 and states(e) | string != desired }}
                        sequence:
                          - service: select.select_option
                            target:
                              entity_id: "{{ mow_order_select_entity }}"
                            data:
                              option: "{{ mow_order_option }}"
                            continue_on_error: true
                  - alias: "Set no-go zone laps before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = no_go_laps_select_entity | string | trim %}
                              {% set desired = no_go_laps_option | string %}
                              {{ e | length > 0 and states(e) | string != desired }}
                        sequence:
                          - service: select.select_option
                            target:
                              entity_id: "{{ no_go_laps_select_entity }}"
                            data:
                              option: "{{ no_go_laps_option }}"
                            continue_on_error: true
                  - alias: "Set obstacle avoidance before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = obstacle_avoidance_select_entity | string | trim %}
                              {% set desired = obstacle_avoidance_option | string %}
                              {{ e | length > 0 and states(e) | string != desired }}
                        sequence:
                          - service: select.select_option
                            target:
                              entity_id: "{{ obstacle_avoidance_select_entity }}"
                            data:
                              option: "{{ obstacle_avoidance_option }}"
                            continue_on_error: true
                  - alias: "Set perimeter laps before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = perimeter_laps_select_entity | string | trim %}
                              {% set desired = perimeter_laps_option | string %}
                              {{ e | length > 0 and states(e) | string != desired }}
                        sequence:
                          - service: select.select_option
                            target:
                              entity_id: "{{ perimeter_laps_select_entity }}"
                            data:
                              option: "{{ perimeter_laps_option }}"
                            continue_on_error: true
                  - alias: "Set traversal mode before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = traversal_mode_select_entity | string | trim %}
                              {% set desired = traversal_mode_option | string %}
                              {{ e | length > 0 and states(e) | string != desired }}
                        sequence:
                          - service: select.select_option
                            target:
                              entity_id: "{{ traversal_mode_select_entity }}"
                            data:
                              option: "{{ traversal_mode_option }}"
                            continue_on_error: true
                  - alias: "Set turnaround mode before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = turnaround_mode_select_entity | string | trim %}
                              {% set desired = turnaround_mode_option | string %}
                              {{ e | length > 0 and states(e) | string != desired }}
                        sequence:
                          - service: select.select_option
                            target:
                              entity_id: "{{ turnaround_mode_select_entity }}"
                            data:
                              option: "{{ turnaround_mode_option }}"
                            continue_on_error: true
                  - alias: "Set wildlife safety before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = wildlife_safety_select_entity | string | trim %}
                              {% set desired = wildlife_safety_option | string %}
                              {{ e | length > 0 and states(e) | string != desired }}
                        sequence:
                          - service: select.select_option
                            target:
                              entity_id: "{{ wildlife_safety_select_entity }}"
                            data:
                              option: "{{ wildlife_safety_option }}"
                            continue_on_error: true
                  - alias: "Ensure auto lighting/night light is on before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = night_light_switch_entity | string | trim %}
                              {{ e | length > 0 and not is_state(e, 'on') }}
                        sequence:
                          - service: switch.turn_on
                            target:
                              entity_id: "{{ night_light_switch_entity }}"
                            continue_on_error: true
                  - alias: "Ensure rain detection during mow is on before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = rain_detection_during_mow_switch_entity | string | trim %}
                              {{ e | length > 0 and not is_state(e, 'on') }}
                        sequence:
                          - service: switch.turn_on
                            target:
                              entity_id: "{{ rain_detection_during_mow_switch_entity }}"
                            continue_on_error: true
                  - alias: "Ensure mower rain detection is on before Zone B"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set e = rain_detection_mower_switch_entity | string | trim %}
                              {{ e | length > 0 and not is_state(e, 'on') }}
                        sequence:
                          - service: switch.turn_on
                            target:
                              entity_id: "{{ rain_detection_mower_switch_entity }}"
                            continue_on_error: true
                  - alias: "Start mowing Zone B"
                    service: lawn_mower.start_mowing
                    target:
                      entity_id: !input mower_entity

                  - alias: "One-time pause recovery after Zone B start"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ post_start_pause_resume_window | int > 0 }}"
                        sequence:
                          - wait_for_trigger:
                              - platform: state
                                entity_id: !input mower_entity
                                to: "paused"
                                id: post_start_paused
                              - platform: state
                                entity_id: !input weather_entity
                                to:
                                  - "rainy"
                                  - "pouring"
                                  - "lightning-rainy"
                                  - "hail"
                                  - "snowy-rainy"
                                  - "exceptional"
                                id: rain
                            timeout:
                              seconds: "{{ post_start_pause_resume_window | int }}"
                            continue_on_timeout: true
                          - choose:
                              - conditions:
                                  - condition: template
                                    value_template: "{{ wait.trigger is not none and wait.trigger.id == 'post_start_paused' }}"
                                sequence:
                                  - service: lawn_mower.start_mowing
                                    target:
                                      entity_id: !input mower_entity
                                    continue_on_error: true
                                  - service: notify.persistent_notification
                                    data:
                                      title: "▶️ {{ mower_display_name }} resumed — Zone B"
                                      message: >
                                        The mower paused shortly after starting {{ zone_b_name }}.
                                        A one-time continue command was sent.
                              - conditions:
                                  - condition: template
                                    value_template: "{{ wait.trigger is not none and wait.trigger.id == 'rain' }}"
                                sequence:
                                  - service: lawn_mower.dock
                                    target:
                                      entity_id: !input mower_entity
                                  - service: input_datetime.set_datetime
                                    target:
                                      entity_id: !input rain_last_seen
                                    data:
                                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                                  - service: notify.persistent_notification
                                    data:
                                      title: "🌧️ {{ mower_display_name }} recalled during Zone B startup"
                                      message: >
                                        Rain was detected during startup for {{ zone_b_name }}.
                                        The mower was sent to dock and the zone tracker was not advanced.
                                  - stop: "Rain detected during startup recovery window"

                  - alias: "Verify Zone B actually started"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {% set activity_entity = mower_activity_mode_sensor | string | trim %}
                              {% set progress_entity = mower_progress_sensor | string | trim %}
                              {% set time_left_entity = mower_time_left_sensor | string | trim %}
                              {% set activity = states(activity_entity) | upper if activity_entity | length > 0 else '' %}
                              {% set mower = states(mower_entity) | lower %}
                              {% set progress = states(progress_entity) | float(0) if progress_entity | length > 0 else 0 %}
                              {% set time_left = states(time_left_entity) | float(0) if time_left_entity | length > 0 else 0 %}
                              {% set started =
                                mower in ['mowing']
                                or activity in ['MODE_WORKING', 'MODE_MOWING', 'MODE_CUTTING', 'MODE_GOING_TO_WORK']
                                or progress > 1
                                or time_left > 0
                              %}
                              {{ not started }}
                        sequence:
                          - service: lawn_mower.dock
                            target:
                              entity_id: !input mower_entity
                            continue_on_error: true
                          - service: input_boolean.turn_off
                            target:
                              entity_id: !input scheduler_in_progress_helper
                            continue_on_error: true
                          - service: notify.persistent_notification
                            data:
                              title: "⚠️ {{ mower_display_name }} failed to start — {{ zone_b_name }}"
                              message: >
                                The scheduler sent the start command, but the mower never entered a mowing/working state.
                                The zone tracker was not advanced past {{ zone_a }}.
                                Mower state: {{ states(mower_entity) }}
                                Activity: {{ states(mower_activity_mode_sensor) if mower_activity_mode_sensor | string | trim | length > 0 else 'not configured' }}
                                Progress: {{ states(mower_progress_sensor) if mower_progress_sensor | string | trim | length > 0 else 'not configured' }}
                                Time left: {{ states(mower_time_left_sensor) if mower_time_left_sensor | string | trim | length > 0 else 'not configured' }}
                          - stop: "Mower failed to start Zone B"

                  - alias: "Wait for Zone B to complete, timeout, or rain to interrupt"
                    wait_for_trigger:
                      - platform: state
                        entity_id: !input weather_entity
                        to:
                          - "rainy"
                          - "pouring"
                          - "lightning-rainy"
                          - "hail"
                          - "snowy-rainy"
                          - "exceptional"
                        id: rain
                      - platform: template
                        id: complete
                        value_template: >
                          {% set progress_entity = mower_progress_sensor | string | trim %}
                          {% set time_left_entity = mower_time_left_sensor | string | trim %}
                          {% set task_entity = mower_task_status_sensor | string | trim %}
                          {% set activity_entity = mower_activity_mode_sensor | string | trim %}
                          {% set progress = states(progress_entity) | float(-1) if progress_entity | length > 0 else -1 %}
                          {% set time_left = states(time_left_entity) | float(999) if time_left_entity | length > 0 else 999 %}
                          {% set task = states(task_entity) | upper if task_entity | length > 0 else '' %}
                          {% set activity = states(activity_entity) | upper if activity_entity | length > 0 else '' %}
                          {% set mower = states(mower_entity) | lower %}
                          {{
                            task == 'COMPLETE'
                            or progress >= 99
                            or (time_left <= 0 and mower in ['docked', 'idle'] and progress >= 90)
                          }}
                      - platform: template
                        id: resume_ready
                        value_template: >
                          {% set progress_entity = mower_progress_sensor | string | trim %}
                          {% set time_left_entity = mower_time_left_sensor | string | trim %}
                          {% set task_entity = mower_task_status_sensor | string | trim %}
                          {% set activity_entity = mower_activity_mode_sensor | string | trim %}
                          {% set charging_entity = mower_charging_binary_sensor | string | trim %}
                          {% set battery_entity = mower_battery_sensor | string | trim %}
                          {% set progress = states(progress_entity) | float(0) if progress_entity | length > 0 else 0 %}
                          {% set time_left = states(time_left_entity) | float(0) if time_left_entity | length > 0 else 0 %}
                          {% set task = states(task_entity) | upper if task_entity | length > 0 else '' %}
                          {% set activity = states(activity_entity) | upper if activity_entity | length > 0 else '' %}
                          {% set mower = states(mower_entity) | lower %}
                          {% set charging = charging_entity | length > 0 and is_state(charging_entity, 'on') %}
                          {% set battery = states(battery_entity) | float(100) if battery_entity | length > 0 else 100 %}
                          {{
                            mower == 'paused'
                            and charging
                            and activity in ['MODE_PAUSE', 'MODE_PAUSED', '']
                            and progress > 1
                            and progress < 98
                            and time_left > 0
                            and battery >= (resume_after_charge_battery_threshold | int(80))
                            and task in ['MOWING', 'WAITING', '']
                          }}
                    timeout:
                      minutes: "{{ zone_duration | int }}"
                    continue_on_timeout: true

                  - alias: "Resume Zone B after charging pause if ready"
                    choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ wait.trigger is not none and wait.trigger.id == 'resume_ready' }}"
                        sequence:
                          - service: notify.persistent_notification
                            data:
                              title: "▶️ {{ mower_display_name }} resuming after charge — {{ zone_b_name }}"
                              message: >
                                The mower is paused on the charger with an unfinished job.
                                Progress: {{ states(mower_progress_sensor) if mower_progress_sensor | string | trim | length > 0 else 'not configured' }}
                                Time left: {{ states(mower_time_left_sensor) if mower_time_left_sensor | string | trim | length > 0 else 'not configured' }}
                                Battery: {{ states(mower_battery_sensor) if mower_battery_sensor | string | trim | length > 0 else 'not configured' }}
                                Sending continue/start command for the same selected area.
                          - service: lawn_mower.start_mowing
                            target:
                              entity_id: !input mower_entity
                            continue_on_error: true
                          - delay:
                              seconds: 90
                          - wait_for_trigger:
                              - platform: state
                                entity_id: !input weather_entity
                                to:
                                  - "rainy"
                                  - "pouring"
                                  - "lightning-rainy"
                                  - "hail"
                                  - "snowy-rainy"
                                  - "exceptional"
                                id: rain
                              - platform: template
                                id: complete
                                value_template: >
                                  {% set progress_entity = mower_progress_sensor | string | trim %}
                                  {% set time_left_entity = mower_time_left_sensor | string | trim %}
                                  {% set task_entity = mower_task_status_sensor | string | trim %}
                                  {% set progress = states(progress_entity) | float(-1) if progress_entity | length > 0 else -1 %}
                                  {% set time_left = states(time_left_entity) | float(999) if time_left_entity | length > 0 else 999 %}
                                  {% set task = states(task_entity) | upper if task_entity | length > 0 else '' %}
                                  {% set mower = states(mower_entity) | lower %}
                                  {{
                                    task == 'COMPLETE'
                                    or progress >= 99
                                    or (time_left <= 0 and mower in ['docked', 'idle'] and progress >= 90)
                                  }}
                            timeout:
                              minutes: "{{ zone_duration | int }}"
                            continue_on_timeout: true

                  - alias: "Return mower to dock after Zone B"
                    service: lawn_mower.dock
                    target:
                      entity_id: !input mower_entity

                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ wait.trigger is not none and wait.trigger.id == 'complete' }}"
                        sequence:
                          - service: input_number.set_value
                            target:
                              entity_id: !input zone_tracker
                            data:
                              value: "{{ zone_b | int }}"
                          - service: input_datetime.set_datetime
                            target:
                              entity_id: !input last_run_tracker
                            data:
                              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                          - service: notify.persistent_notification
                            data:
                              title: "✅ {{ mower_display_name }} finished — {{ zone_b_name }}"
                              message: >
                                Zone {{ zone_b }} ({{ zone_b_name }}) completed.
                                Zone tracker advanced to {{ zone_b }}.
                      - conditions:
                          - condition: template
                            value_template: "{{ wait.trigger is none }}"
                        sequence:
                          - service: input_boolean.turn_off
                            target:
                              entity_id: !input scheduler_in_progress_helper
                            continue_on_error: true
                          - service: notify.persistent_notification
                            data:
                              title: "⚠️ {{ mower_display_name }} timed out — {{ zone_b_name }} not counted"
                              message: >
                                The mower did not report completion before the zone timeout.
                                Zone {{ zone_b }} was not counted complete and the zone tracker stays at {{ zone_a }}.
                                Mower state: {{ states(mower_entity) }}
                                Activity: {{ states(mower_activity_mode_sensor) if mower_activity_mode_sensor | string | trim | length > 0 else 'not configured' }}
                                Progress: {{ states(mower_progress_sensor) if mower_progress_sensor | string | trim | length > 0 else 'not configured' }}
                                Time left: {{ states(mower_time_left_sensor) if mower_time_left_sensor | string | trim | length > 0 else 'not configured' }}
                          - stop: "Zone B timed out without completion"
                      - conditions:
                          - condition: template
                            value_template: "{{ wait.trigger is not none and wait.trigger.id == 'rain' }}"
                        sequence:
                          - service: input_datetime.set_datetime
                            target:
                              entity_id: !input rain_last_seen
                            data:
                              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                          - service: notify.persistent_notification
                            data:
                              title: "🌧️ {{ mower_display_name }} recalled mid-mow — Zone B"
                              message: >
                                Rain detected while mowing {{ zone_b_name }}. The mower was sent to dock.
                                Zone tracker stays at {{ zone_a }}.
                                A 6-hour dry-out delay is now active.
            default:
              - service: input_datetime.set_datetime
                target:
                  entity_id: !input rain_last_seen
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
              - service: notify.persistent_notification
                data:
                  title: "🌧️ {{ mower_display_name }} Zone B skipped — {{ trigger.id }}"
                  message: >
                    Rain detected before Zone B. Skipping {{ zone_b_name }}.
                    Zone tracker stays at {{ zone_a }}.
              - stop: "Rain detected before Zone B"
