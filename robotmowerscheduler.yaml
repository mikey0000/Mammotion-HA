          - condition: template
            value_template: >
              {% set e = no_go_laps_select_entity | string | trim %}
              {% set desired = no_go_laps_option | string %}
              {{ e | length > 0 and states(e) | string != desired }}
        sequence:
          - service: select.select_option
            target:
              entity_id: "{{ no_go_laps_select_entity }}"
            data:
              option: "{{ no_go_laps_option }}"
            continue_on_error: true
  - alias: "Set obstacle avoidance before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = obstacle_avoidance_select_entity | string | trim %}
              {% set desired = obstacle_avoidance_option | string %}
              {{ e | length > 0 and states(e) | string != desired }}
        sequence:
          - service: select.select_option
            target:
              entity_id: "{{ obstacle_avoidance_select_entity }}"
            data:
              option: "{{ obstacle_avoidance_option }}"
            continue_on_error: true
  - alias: "Set perimeter laps before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = perimeter_laps_select_entity | string | trim %}
              {% set desired = perimeter_laps_option | string %}
              {{ e | length > 0 and states(e) | string != desired }}
        sequence:
          - service: select.select_option
            target:
              entity_id: "{{ perimeter_laps_select_entity }}"
            data:
              option: "{{ perimeter_laps_option }}"
            continue_on_error: true
  - alias: "Set traversal mode before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = traversal_mode_select_entity | string | trim %}
              {% set desired = traversal_mode_option | string %}
              {{ e | length > 0 and states(e) | string != desired }}
        sequence:
          - service: select.select_option
            target:
              entity_id: "{{ traversal_mode_select_entity }}"
            data:
              option: "{{ traversal_mode_option }}"
            continue_on_error: true
  - alias: "Set turnaround mode before Zone A"
