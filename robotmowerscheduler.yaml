  days_session_1: !input days_session_1
  days_session_2: !input days_session_2
  days_session_3: !input days_session_3
  days_session_4: !input days_session_4
  blade_height_number_entity: !input blade_height_number_entity
  mammotion_blade_height: !input mammotion_blade_height
  working_speed_number_entity: !input working_speed_number_entity
  mammotion_working_speed: !input mammotion_working_speed
  cutting_path_angle_number_entity: !input cutting_path_angle_number_entity
  mammotion_cutting_path_angle: !input mammotion_cutting_path_angle
  crossing_angle_number_entity: !input crossing_angle_number_entity
  mammotion_crossing_angle: !input mammotion_crossing_angle
  path_spacing_number_entity: !input path_spacing_number_entity
  mammotion_path_spacing: !input mammotion_path_spacing
  start_progress_number_entity: !input start_progress_number_entity
  mammotion_start_progress: !input mammotion_start_progress
  cutter_speed_select_entity: !input cutter_speed_select_entity
  cutter_speed_option: !input cutter_speed_option
  cutting_path_mode_select_entity: !input cutting_path_mode_select_entity
  cutting_path_mode_option: !input cutting_path_mode_option
  cutting_path_angle_mode_select_entity: !input cutting_path_angle_mode_select_entity
  cutting_path_angle_mode_option: !input cutting_path_angle_mode_option
  mow_order_select_entity: !input mow_order_select_entity
  mow_order_option: !input mow_order_option
  no_go_laps_select_entity: !input no_go_laps_select_entity
  no_go_laps_option: !input no_go_laps_option
  obstacle_avoidance_select_entity: !input obstacle_avoidance_select_entity
  obstacle_avoidance_option: !input obstacle_avoidance_option
  perimeter_laps_select_entity: !input perimeter_laps_select_entity
  perimeter_laps_option: !input perimeter_laps_option
  traversal_mode_select_entity: !input traversal_mode_select_entity
  traversal_mode_option: !input traversal_mode_option
  turnaround_mode_select_entity: !input turnaround_mode_select_entity
  turnaround_mode_option: !input turnaround_mode_option
  wildlife_safety_select_entity: !input wildlife_safety_select_entity
  wildlife_safety_option: !input wildlife_safety_option
  night_light_switch_entity: !input night_light_switch_entity
  rain_detection_during_mow_switch_entity: !input rain_detection_during_mow_switch_entity
  rain_detection_mower_switch_entity: !input rain_detection_mower_switch_entity

condition:
  - alias: "Skip session if manual skip toggle is on"
    condition: template
    value_template: "{{ not is_state(skip_toggle, 'on') }}"

action:
  - variables:
      zone_mod: "{{ active_zone_count | int(6) }}"
      current_zone: "{{ states(zone_tracker) | int(0) }}"
      zone_a: "{{ ((states(zone_tracker) | int(0)) % (active_zone_count | int(6))) + 1 }}"
      zone_b: "{{ ((((states(zone_tracker) | int(0)) % (active_zone_count | int(6))) + 1) % (active_zone_count | int(6))) + 1 }}"
      effective_zones_per_session: "{{ 1 if (active_zone_count | int(6)) <= 1 else (zones_per_session | int(1)) }}"
      zone_a_switch: >
        {% set s = {1: sw1, 2: sw2, 3: sw3, 4: sw4, 5: sw5, 6: sw6} %}
        {{ s[zone_a | int] }}
      zone_b_switch: >
        {% set s = {1: sw1, 2: sw2, 3: sw3, 4: sw4, 5: sw5, 6: sw6} %}
        {{ s[zone_b | int] }}
      zone_a_name: >
        {% set n = {1: z1, 2: z2, 3: z3, 4: z4, 5: z5, 6: z6} %}
        {{ n[zone_a | int] }}
      zone_b_name: >
        {% set n = {1: z1, 2: z2, 3: z3, 4: z4, 5: z5, 6: z6} %}
        {{ n[zone_b | int] }}
      allowed_days: >
        {% if trigger.id == 'session_1' %}{{ days_session_1 }}
        {% elif trigger.id == 'session_2' %}{{ days_session_2 }}
        {% elif trigger.id == 'session_3' %}{{ days_session_3 }}
        {% elif trigger.id == 'session_4' %}{{ days_session_4 }}
        {% else %}['mon','tue','wed','thu','fri','sat','sun']{% endif %}
      today_dow: "{{ now().strftime('%a').lower() }}"
      secs_since_rain: >
        {% set r = states(rain_last_seen) %}
        {% if r not in ['unknown', 'unavailable', 'none', ''] %}
          {{ (as_timestamp(now()) - as_timestamp(r)) | int }}
        {% else %}
          86400
        {% endif %}

  - condition: template
    alias: "Skip scheduled session if today is not active; manual starts bypass only this day gate"
    value_template: "{{ trigger.id == 'manual_start' or today_dow in allowed_days }}"

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ states(weather_entity) in ['rainy', 'pouring', 'lightning-rainy', 'hail', 'snowy-rainy', 'exceptional'] }}
        sequence:
          - service: input_datetime.set_datetime
            target:
              entity_id: !input rain_last_seen
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - service: notify.persistent_notification
            data:
              title: "🌧️ {{ mower_display_name }} session skipped — rain"
              message: >
                {{ trigger.id }} skipped: forecast shows {{ states(weather_entity) }}.
                A 6-hour dry-out delay will apply once rain clears.
          - stop: "Currently raining — session skipped"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ secs_since_rain | int < 21600 }}"
        sequence:
          - service: notify.persistent_notification
            data:
              title: "💧 {{ mower_display_name }} session skipped — wet lawn delay"
              message: >
                {{ trigger.id }} skipped: lawn is still in its 6-hour dry-out period.
                Rain was last recorded {{ (secs_since_rain | int / 3600) | round(1) }} hours ago.
                {{ ((21600 - secs_since_rain | int) / 60) | int }} minutes remaining before mowing resumes.
          - stop: "Wet lawn delay active — session skipped"

  - choose:
      - conditions:
          - condition: template
            alias: "Clear stale scheduler-in-progress helper when mower is truly ready"
            value_template: >
              {% set helper = scheduler_in_progress_helper | string | trim %}
              {% set mower = states(mower_entity) | lower %}
              {% set charging_entity = mower_charging_binary_sensor | string | trim %}
              {% set activity_entity = mower_activity_mode_sensor | string | trim %}
              {% set progress_entity = mower_progress_sensor | string | trim %}
              {% set time_left_entity = mower_time_left_sensor | string | trim %}
              {% set charging = charging_entity | length > 0 and is_state(charging_entity, 'on') %}
              {% set activity = states(activity_entity) | upper if activity_entity | length > 0 else '' %}
              {% set progress = states(progress_entity) | float(0) if progress_entity | length > 0 else 0 %}
              {% set time_left = states(time_left_entity) | float(0) if time_left_entity | length > 0 else 0 %}
              {% set clearly_ready =
                mower in ['docked', 'idle']
                and charging
                and activity in ['MODE_READY', 'MODE_CHARGING', '']
                and progress <= 1
                and time_left <= 0
              %}
              {{ helper | length > 0 and is_state(helper, 'on') and clearly_ready }}
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input scheduler_in_progress_helper
          - service: notify.persistent_notification
            data:
              title: "🧹 {{ mower_display_name }} scheduler helper reset"
              message: >
                {{ trigger.id }} found the scheduler-in-progress helper stuck on, but the mower is docked/charging/ready with no active job.
                The helper was cleared and the session will continue.

  - choose:
      - conditions:
          - condition: template
            alias: "Skip only if mower or scheduler is truly active"
            value_template: >
              {% set helper = scheduler_in_progress_helper | string | trim %}
              {% set helper_on = helper | length > 0 and is_state(helper, 'on') %}
              {% set mower = states(mower_entity) | lower %}
              {% set charging_entity = mower_charging_binary_sensor | string | trim %}
              {% set activity_entity = mower_activity_mode_sensor | string | trim %}
              {% set progress_entity = mower_progress_sensor | string | trim %}
              {% set time_left_entity = mower_time_left_sensor | string | trim %}
              {% set charging = charging_entity | length > 0 and is_state(charging_entity, 'on') %}
              {% set activity = states(activity_entity) | upper if activity_entity | length > 0 else '' %}
              {% set progress = states(progress_entity) | float(0) if progress_entity | length > 0 else 0 %}
              {% set time_left = states(time_left_entity) | float(0) if time_left_entity | length > 0 else 0 %}
              {% set clearly_ready =
                mower in ['docked', 'idle']
                and charging
                and activity in ['MODE_READY', 'MODE_CHARGING', '']
                and progress <= 1
                and time_left <= 0
              %}
              {% set mower_active =
                mower in ['mowing', 'paused', 'returning', 'error']
                or activity in ['MODE_WORKING', 'MODE_PAUSED', 'MODE_PAUSE', 'MODE_RETURNING', 'MODE_ERROR']
                or progress > 1
                or time_left > 0
              %}
              {{ (helper_on or mower_active) and not clearly_ready }}
        sequence:
          - service: notify.persistent_notification
            data:
              title: "⏸️ {{ mower_display_name }} session skipped — mower already active"
              message: >
                {{ trigger.id }} was skipped because the mower still appears active.
                Mower state: {{ states(mower_entity) }}
                Charging: {{ states(mower_charging_binary_sensor) if mower_charging_binary_sensor | string | trim | length > 0 else 'not configured' }}
                Activity: {{ states(mower_activity_mode_sensor) if mower_activity_mode_sensor | string | trim | length > 0 else 'not configured' }}
                Progress: {{ states(mower_progress_sensor) if mower_progress_sensor | string | trim | length > 0 else 'not configured' }}
                Time left: {{ states(mower_time_left_sensor) if mower_time_left_sensor | string | trim | length > 0 else 'not configured' }}
                Scheduler in progress: {{ states(scheduler_in_progress_helper) if scheduler_in_progress_helper | string | trim | length > 0 else 'not configured' }}
          - stop: "Mower or scheduler helper is truly active"

  - choose:
      - conditions:
          - condition: template
            alias: "Skip if recent low-battery resume condition indicates unfinished task"
            value_template: >
              {% set err_entity = mower_last_error_sensor | string | trim %}
              {% set time_entity = mower_last_error_time_sensor | string | trim %}
              {% set code_entity = mower_last_error_code_sensor | string | trim %}
              {% set charging_entity = mower_charging_binary_sensor | string | trim %}
              {% set activity_entity = mower_activity_mode_sensor | string | trim %}
              {% set err = states(err_entity) | lower if err_entity | length > 0 else '' %}
              {% set code = states(code_entity) | string | trim if code_entity | length > 0 else '' %}
              {% set configured_codes = (low_battery_resume_error_codes | string | replace(' ', '')).split(',') %}
              {% set code_matches = code | length > 0 and code in configured_codes %}
              {% set text_matches = 'battery is too low' in err and 'resume unfinished' in err %}
              {% set raw_time = states(time_entity) if time_entity | length > 0 else '' %}
              {% set err_ts = as_timestamp(raw_time, none) %}
              {% if err_ts is none and err_entity | length > 0 and err_entity in states %}
                {% set err_ts = as_timestamp(states[err_entity].last_changed, none) %}
              {% endif %}
              {% set age = 999999 if err_ts is none else (as_timestamp(now()) - err_ts) | int %}
              {% set mower = states(mower_entity) | lower %}
              {% set charging = charging_entity | length > 0 and is_state(charging_entity, 'on') %}
              {% set activity = states(activity_entity) | upper if activity_entity | length > 0 else '' %}
              {% set waiting_state = mower in ['charging', 'paused', 'returning', 'error'] or charging or activity in ['MODE_CHARGING','MODE_PAUSED','MODE_PAUSE','MODE_RETURNING','MODE_ERROR'] %}
              {{ (text_matches or code_matches) and waiting_state and age < (resume_error_guard_hours | int(6) * 3600) }}
        sequence:
          - service: notify.persistent_notification
            data:
              title: "🔋 {{ mower_display_name }} session skipped — previous task may resume"
              message: >
                {{ trigger.id }} was skipped before changing area switches because a recent
                low-battery unfinished-task resume condition was detected.

                Mower state: {{ states(mower_entity) }}
                Charging: {{ states(mower_charging_binary_sensor) if mower_charging_binary_sensor | string | trim | length > 0 else 'not configured' }}
                Activity: {{ states(mower_activity_mode_sensor) if mower_activity_mode_sensor | string | trim | length > 0 else 'not configured' }}
                Last error: {{ states(mower_last_error_sensor) if mower_last_error_sensor | string | trim | length > 0 else 'not configured' }}
                Last error code: {{ states(mower_last_error_code_sensor) if mower_last_error_code_sensor | string | trim | length > 0 else 'not configured' }}
          - stop: "Recent low-battery unfinished-task condition detected"

  - choose:
      - conditions:
          - condition: template
            alias: "Skip if any active zone switch is missing"
            value_template: >
              {% set switches = [sw1, sw2, sw3, sw4, sw5, sw6] %}
              {% set active = switches[:zone_mod | int(6)] %}
              {{ active | map('string') | map('trim') | select('eq', '') | list | count > 0 }}
        sequence:
          - service: notify.persistent_notification
            data:
              title: "⚠️ {{ mower_display_name }} session skipped — zone switch missing"
              message: >
                Active Zone Count is {{ zone_mod }}, but one or more zone switch inputs
                inside that active range are blank.
          - stop: "One or more active zone switches are missing"

  - service: notify.persistent_notification
    data:
      title: "🌿 {{ mower_display_name }} starting — {{ trigger.id }}"
      message: >
        Zone tracker at {{ current_zone }}, mowing {{ zone_a_name }} (zone {{ zone_a }})
        {% if effective_zones_per_session | int >= 2 %} then {{ zone_b_name }} (zone {{ zone_b }}){% endif %}.
        Forecast: {{ states(weather_entity) }}.

  - alias: "Turn off all active area switches before Zone A"
    service: switch.turn_off
    target:
      entity_id: >
        {{ [sw1, sw2, sw3, sw4, sw5, sw6][:zone_mod | int(6)] | reject('eq', '') | list }}

  - delay:
      seconds: 6

  - alias: "Enable only Zone A switch"
    service: switch.turn_on
    target:
      entity_id: "{{ zone_a_switch }}"

  - delay:
      seconds: 9

  # ── Apply Mammotion integration settings before Zone A only if needed ────────────
  - alias: "Set blade height before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = blade_height_number_entity | string | trim %}
              {% set current = states(e) | float(none) if e | length > 0 else none %}
              {% set desired = mammotion_blade_height | float %}
              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ blade_height_number_entity }}"
            data:
              value: "{{ mammotion_blade_height | int }}"
            continue_on_error: true
  - alias: "Set working speed before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = working_speed_number_entity | string | trim %}
              {% set current = states(e) | float(none) if e | length > 0 else none %}
              {% set desired = mammotion_working_speed | float %}
              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ working_speed_number_entity }}"
            data:
              value: "{{ mammotion_working_speed | float }}"
            continue_on_error: true
  - alias: "Set cutting path angle before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = cutting_path_angle_number_entity | string | trim %}
              {% set current = states(e) | float(none) if e | length > 0 else none %}
              {% set desired = mammotion_cutting_path_angle | float %}
              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ cutting_path_angle_number_entity }}"
            data:
              value: "{{ mammotion_cutting_path_angle | int }}"
            continue_on_error: true
  - alias: "Set crossing angle before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = crossing_angle_number_entity | string | trim %}
              {% set current = states(e) | float(none) if e | length > 0 else none %}
              {% set desired = mammotion_crossing_angle | float %}
              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ crossing_angle_number_entity }}"
            data:
              value: "{{ mammotion_crossing_angle | int }}"
            continue_on_error: true
  - alias: "Set path spacing before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = path_spacing_number_entity | string | trim %}
              {% set current = states(e) | float(none) if e | length > 0 else none %}
              {% set desired = mammotion_path_spacing | float %}
              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ path_spacing_number_entity }}"
            data:
              value: "{{ mammotion_path_spacing | int }}"
            continue_on_error: true
  - alias: "Set start progress before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = start_progress_number_entity | string | trim %}
              {% set current = states(e) | float(none) if e | length > 0 else none %}
              {% set desired = mammotion_start_progress | float %}
              {{ e | length > 0 and (current is none or (current - desired) | abs > 0.001) }}
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ start_progress_number_entity }}"
            data:
              value: "{{ mammotion_start_progress | int }}"
            continue_on_error: true
  - alias: "Set cutter speed before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = cutter_speed_select_entity | string | trim %}
              {% set desired = cutter_speed_option | string %}
              {{ e | length > 0 and states(e) | string != desired }}
        sequence:
          - service: select.select_option
            target:
              entity_id: "{{ cutter_speed_select_entity }}"
            data:
              option: "{{ cutter_speed_option }}"
            continue_on_error: true
  - alias: "Set cutting path mode before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = cutting_path_mode_select_entity | string | trim %}
              {% set desired = cutting_path_mode_option | string %}
              {{ e | length > 0 and states(e) | string != desired }}
        sequence:
          - service: select.select_option
            target:
              entity_id: "{{ cutting_path_mode_select_entity }}"
            data:
              option: "{{ cutting_path_mode_option }}"
            continue_on_error: true
  - alias: "Set cutting path angle mode before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = cutting_path_angle_mode_select_entity | string | trim %}
              {% set desired = cutting_path_angle_mode_option | string %}
              {{ e | length > 0 and states(e) | string != desired }}
        sequence:
          - service: select.select_option
            target:
              entity_id: "{{ cutting_path_angle_mode_select_entity }}"
            data:
              option: "{{ cutting_path_angle_mode_option }}"
            continue_on_error: true
  - alias: "Set mow order before Zone A"
    choose:
      - conditions:
          - condition: template
            value_template: >
              {% set e = mow_order_select_entity | string | trim %}
              {% set desired = mow_order_option | string %}
              {{ e | length > 0 and states(e) | string != desired }}
        sequence:
          - service: select.select_option
            target:
              entity_id: "{{ mow_order_select_entity }}"
            data:
              option: "{{ mow_order_option }}"
            continue_on_error: true
  - alias: "Set no-go zone laps before Zone A"
    choose:
