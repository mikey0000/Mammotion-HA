  low_battery_resume_error_codes: !input low_battery_resume_error_codes
  mower_charging_binary_sensor: !input mower_charging_binary_sensor
  mower_activity_mode_sensor: !input mower_activity_mode_sensor
  mower_progress_sensor: !input mower_progress_sensor
  mower_time_left_sensor: !input mower_time_left_sensor
  mower_battery_sensor: !input mower_battery_sensor
  mower_task_status_sensor: !input mower_task_status_sensor
  resume_error_guard_hours: !input resume_error_guard_hours
  weather_entity: !input weather_entity
  zone_tracker: !input zone_tracker
  skip_toggle: !input skip_toggle
  scheduler_in_progress_helper: !input scheduler_in_progress_helper
  rain_last_seen: !input rain_last_seen
  zones_per_session: !input zones_per_session
  zone_duration: !input zone_duration
  resume_after_charge_battery_threshold: !input resume_after_charge_battery_threshold
  inter_zone_rest: !input inter_zone_rest
  active_zone_count: !input active_zone_count
  post_start_pause_resume_window: !input post_start_pause_resume_window
  sw1: !input zone_1_switch
  sw2: !input zone_2_switch
  sw3: !input zone_3_switch
  sw4: !input zone_4_switch
  sw5: !input zone_5_switch
