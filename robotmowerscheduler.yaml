blueprint:
  name: "Robot Mower Scheduler"
  description: >
    Robot mower scheduler for Mammotion mowers using the newer Mammotion
    integration entity model. It rotates through configured area switches,
    applies mower setting entities such as blade height, working speed, path
    mode, mow order, obstacle behavior, perimeter laps, traversal mode, and
    turnaround mode, then starts the mower through the lawn_mower entity.

    This public version uses generic configurable entity inputs and contains no private mower names.

    ── WHAT THIS BLUEPRINT DOES ─────────────────────────────────────────────
    1. Runs up to four scheduled mow sessions per day, each with its own
       allowed days.
    2. Supports a manual Start Next Mow input_button trigger.
    3. Rotates through the first N active Mammotion area switches.
    4. Uses the kept helpers for zone rotation, manual skip, last run, rain
       dry-out tracking, and manual triggering.
    5. Applies new-integration number/select/switch entities before each mow.
    6. Checks rain at session start, during mowing, and before Zone B.
    7. Keeps the 6-hour wet-lawn dry-out delay.
    8. Guards against interrupting a recent low-battery unfinished-task resume
       condition using Last Error, Last Error Time, optional Last Error Code,
       optional Charging, and optional Activity Mode entities.
    9. Verifies the mower actually leaves ready/docked state after a start command,
       and never counts a timeout as a completed zone.

    ── REQUIRED HELPERS ─────────────────────────────────────────────────────
    Create these helpers at Settings → Devices & Services → Helpers:
      • input_number  — Mower Last Zone, min=0, max=6, step=1, initial=0
      • input_boolean — Mower Manual Skip
      • input_datetime— Mower Last Run, date and time
      • input_datetime— Mower Rain Last Seen, date and time
      • input_button  — Mower Start Next Mow

    ── NEW MAMMOTION INTEGRATION MODEL ─────────────────────────────────────
    The mower settings are applied using Home Assistant entities such as
    number.*_blade_height, number.*_working_speed, select.*_cutting_path_mode,
    select.*_mow_order, select.*_obstacle_avoidance_mode, and related entities.
    Any optional setting entity left blank is skipped.

  domain: automation
  source_url: https://community.home-assistant.io

  input:
    mower_section:
      name: Mower
      icon: mdi:robot-mower
      input:
        mower_entity:
          name: Mower Entity
          description: Main lawn_mower entity.
          default: ""
          selector:
            entity:
              domain: lawn_mower

        mower_display_name:
          name: Mower Display Name
          description: Name used in notifications.
          default: Mower
          selector:
            text: {}

        manual_start_button:
          name: Manual Start Next Mow Button
          description: input_button helper used to manually start the next mow using this blueprint's full safety logic.
          default: input_button.mower_start_next_mow
          selector:
            entity:
              domain: input_button

    status_section:
      name: Mower Status / Resume Protection
      icon: mdi:shield-alert
      collapsed: true
      input:
        mower_last_error_sensor:
          name: Last Error Sensor
          description: Optional Mammotion Last Error sensor. Used only with recency checks because this may be historical.
          default: ""
          selector:
            entity:
              domain: sensor

        mower_last_error_time_sensor:
          name: Last Error Time Sensor
          description: Optional timestamp sensor for when the last error occurred. Preferred over last_changed.
          default: ""
          selector:
            entity:
              domain: sensor

        mower_last_error_code_sensor:
          name: Last Error Code Sensor
          description: Optional Mammotion error-code sensor. Useful when the text says Error message not found.
          default: ""
          selector:
            entity:
              domain: sensor

        low_battery_resume_error_codes:
          name: Low-Battery Resume Error Codes
          description: >
            Optional comma-separated error codes that mean low battery / unfinished task will resume.
            Leave blank to use text matching only. Verify codes for your mower/integration.
          default: ""
          selector:
            text: {}

        mower_charging_binary_sensor:
          name: Charging Binary Sensor
          description: Optional binary_sensor that is on when the mower is charging.
          default: ""
          selector:
            entity:
              domain: binary_sensor

        mower_activity_mode_sensor:
          name: Activity Mode Sensor
          description: Optional activity/status sensor, such as MODE_WORKING, MODE_CHARGING, or similar.
          default: ""
          selector:
            entity:
              domain: sensor

        mower_progress_sensor:
          name: Mower Progress Sensor
          description: Optional progress sensor used to detect when a mowing task has completed.
          default: ""
          selector:
            entity:
              domain: sensor

        mower_time_left_sensor:
          name: Mower Time Left Sensor
          description: Optional time-left sensor used as a secondary completion signal.
          default: ""
          selector:
            entity:
              domain: sensor

        mower_battery_sensor:
          name: Mower Battery Sensor
          description: Optional battery percentage sensor. Used to resume an unfinished paused/charging mow after the mower has recharged. Leave blank to assume battery is ready when the mower is paused and charging.
          default: ""
          selector:
            entity:
              domain: sensor

        mower_task_status_sensor:
          name: Mower Task Area Status Sensor
          description: Optional task-area status sensor. If it reports COMPLETE, the zone tracker advances immediately.
          default: ""
          selector:
            entity:
              domain: sensor

        resume_error_guard_hours:
          name: Low-Battery Resume Error Guard Time
          description: How long a recent matching low-battery/resume error should block starting a new scheduled task.
          default: 6
          selector:
            number:
              min: 1
              max: 24
              step: 1
              unit_of_measurement: h
              mode: slider

    zone_switches_section:
      name: Zone Area Switches
      icon: mdi:toggle-switch
      description: Select the Mammotion area switch for each zone. Only the first Active Zone Count switches are used.
      collapsed: true
      input:
        zone_1_switch:
          name: "Zone 1 — Area Switch"
          default: ""
          selector:
            entity:
              domain: switch
              integration: mammotion

        zone_2_switch:
          name: "Zone 2 — Area Switch"
          default: ""
          selector:
            entity:
              domain: switch
              integration: mammotion

        zone_3_switch:
          name: "Zone 3 — Area Switch"
          default: ""
          selector:
            entity:
              domain: switch
              integration: mammotion

        zone_4_switch:
          name: "Zone 4 — Area Switch"
          default: ""
          selector:
            entity:
              domain: switch
              integration: mammotion

        zone_5_switch:
          name: "Zone 5 — Area Switch"
          default: ""
          selector:
            entity:
              domain: switch
              integration: mammotion

        zone_6_switch:
          name: "Zone 6 — Area Switch"
          default: ""
          selector:
            entity:
              domain: switch
              integration: mammotion

    zone_names_section:
      name: Zone Display Names
      icon: mdi:tag-text
      collapsed: true
      input:
        zone_1_name:
          name: "Zone 1 — Display Name"
          default: "Zone 1"
          selector:
            text: {}

        zone_2_name:
          name: "Zone 2 — Display Name"
          default: "Zone 2"
          selector:
            text: {}

        zone_3_name:
          name: "Zone 3 — Display Name"
          default: "Zone 3"
          selector:
            text: {}

        zone_4_name:
          name: "Zone 4 — Display Name"
          default: "Zone 4"
          selector:
            text: {}

        zone_5_name:
          name: "Zone 5 — Display Name"
          default: "Zone 5"
          selector:
            text: {}

        zone_6_name:
          name: "Zone 6 — Display Name"
          default: "Zone 6"
          selector:
            text: {}

    weather_section:
      name: Weather & Rain
      icon: mdi:weather-rainy
      input:
        weather_entity:
          name: Forecast Weather Entity
          description: Sessions are skipped when state is rainy, pouring, lightning-rainy, hail, snowy-rainy, or exceptional.
          default: ""
          selector:
            entity:
              domain: weather

    session_1_section:
      name: "Session 1"
      icon: mdi:clock-start
      input:
        mow_time_1:
          name: "Session 1 — Start Time"
          default: "04:00:00"
          selector:
            time: {}
        days_session_1:
          name: "Session 1 — Active Days"
          default: [mon, tue, wed, thu, fri, sat, sun]
          selector:
            select:
              multiple: true
              options:
                - label: "Monday"
                  value: mon
                - label: "Tuesday"
                  value: tue
                - label: "Wednesday"
                  value: wed
                - label: "Thursday"
                  value: thu
                - label: "Friday"
                  value: fri
                - label: "Saturday"
                  value: sat
                - label: "Sunday"
                  value: sun

    session_2_section:
      name: "Session 2"
      icon: mdi:clock-start
      input:
        mow_time_2:
          name: "Session 2 — Start Time"
          default: "18:30:00"
          selector:
            time: {}
        days_session_2:
          name: "Session 2 — Active Days"
          default: [mon, tue, wed, thu, fri, sat, sun]
          selector:
            select:
              multiple: true
              options:
                - label: "Monday"
                  value: mon
                - label: "Tuesday"
                  value: tue
                - label: "Wednesday"
                  value: wed
                - label: "Thursday"
                  value: thu
                - label: "Friday"
                  value: fri
                - label: "Saturday"
                  value: sat
                - label: "Sunday"
                  value: sun

    session_3_section:
      name: "Session 3 (optional)"
      icon: mdi:clock-start
      collapsed: true
      input:
        mow_time_3:
          name: "Session 3 — Start Time"
          default: "04:00:00"
          selector:
            time: {}
        days_session_3:
          name: "Session 3 — Active Days"
          default: []
          selector:
            select:
              multiple: true
              options:
                - label: "Monday"
                  value: mon
                - label: "Tuesday"
                  value: tue
                - label: "Wednesday"
                  value: wed
                - label: "Thursday"
                  value: thu
                - label: "Friday"
                  value: fri
                - label: "Saturday"
                  value: sat
                - label: "Sunday"
                  value: sun

    session_4_section:
      name: "Session 4 (optional)"
      icon: mdi:clock-start
      collapsed: true
      input:
        mow_time_4:
          name: "Session 4 — Start Time"
          default: "18:30:00"
          selector:
            time: {}
        days_session_4:
          name: "Session 4 — Active Days"
          default: []
          selector:
            select:
              multiple: true
              options:
                - label: "Monday"
                  value: mon
                - label: "Tuesday"
                  value: tue
                - label: "Wednesday"
                  value: wed
                - label: "Thursday"
                  value: thu
                - label: "Friday"
                  value: fri
                - label: "Saturday"
                  value: sat
                - label: "Sunday"
                  value: sun

    helpers_section:
      name: Helpers
      icon: mdi:database
      collapsed: true
      input:
        zone_tracker:
          name: Zone Tracker (input_number)
          default: ""
          selector:
            entity:
              domain: input_number
        skip_toggle:
          name: Manual Skip Toggle (input_boolean)
          default: ""
          selector:
            entity:
              domain: input_boolean

        scheduler_in_progress_helper:
          name: Scheduler In Progress Helper (input_boolean)
          description: Optional helper that is on only while this scheduler is actively managing a mower run. If it gets stuck on while the mower is docked/charging/ready, this blueprint automatically clears it instead of skipping the next session.
          default: ""
          selector:
            entity:
              domain: input_boolean
        last_run_tracker:
          name: Last Run Datetime (input_datetime)
          default: ""
          selector:
            entity:
              domain: input_datetime
        rain_last_seen:
          name: Rain Last Seen (input_datetime)
          default: ""
          selector:
            entity:
              domain: input_datetime

    behaviour_section:
      name: Mowing Behaviour
      icon: mdi:tune
      collapsed: true
      input:
        active_zone_count:
          name: Active Zone Count
          description: Number of configured mowing zones to cycle through.
          default: 6
          selector:
            number:
              min: 1
              max: 6
              step: 1
              mode: slider
        zones_per_session:
          name: Zones Per Session
          default: 1
          selector:
            number:
              min: 1
              max: 2
              step: 1
              mode: slider
        zone_duration:
          name: Zone Duration Ceiling (minutes)
          default: 240
          selector:
            number:
              min: 15
              max: 300
              step: 5
              unit_of_measurement: min
              mode: slider
        resume_after_charge_battery_threshold:
          name: Resume After Charge Battery Threshold (%)
          description: If the mower pauses on the charger mid-zone, resume the same job when battery is at or above this percentage.
          default: 80
          selector:
            number:
              min: 50
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider
        inter_zone_rest:
          name: Rest Between Zones (minutes)
          default: 40
          selector:
            number:
              min: 5
              max: 120
              step: 5
              unit_of_measurement: min
              mode: slider
        post_start_pause_resume_window:
          name: Immediate Pause Recovery Window (seconds)
          description: Watch briefly after start; if the mower becomes paused, send one continue command.
          default: 75
          selector:
            number:
              min: 0
              max: 180
              step: 5
              unit_of_measurement: s
              mode: slider

    new_integration_settings_section:
      name: Mammotion Mowing Settings
      icon: mdi:robot-mower-outline
      description: >
        Optional new-integration setting entities. Set the entity ID and desired value.
        Blank entity IDs are skipped. Defaults match conservative mower settings.
      collapsed: true
      input:
        blade_height_number_entity:
          name: Blade Height Number Entity
          default: ""
          selector:
            entity:
              domain: number
        mammotion_blade_height:
          name: Blade Height (mm)
          default: 100
          selector:
            number:
              min: 20
              max: 100
              step: 1
              unit_of_measurement: mm
              mode: slider

        working_speed_number_entity:
          name: Working Speed Number Entity
          default: ""
          selector:
            entity:
              domain: number
        mammotion_working_speed:
          name: Working Speed (m/s)
          default: 0.3
          selector:
            number:
              min: 0.1
              max: 1.2
              step: 0.1
              unit_of_measurement: m/s
              mode: slider

        cutting_path_angle_number_entity:
          name: Cutting Path Angle Number Entity
          default: ""
          selector:
            entity:
              domain: number
        mammotion_cutting_path_angle:
          name: Cutting Path Angle (degrees)
          default: 90
          selector:
            number:
              min: -180
              max: 180
              step: 1
              unit_of_measurement: "°"
              mode: slider

        crossing_angle_number_entity:
          name: Crossing Angle Number Entity (optional)
          default: ""
          selector:
            entity:
              domain: number
        mammotion_crossing_angle:
          name: Crossing Angle (degrees)
          default: 90
          selector:
            number:
              min: -180
              max: 180
              step: 1
              unit_of_measurement: "°"
              mode: slider

        path_spacing_number_entity:
          name: Path Spacing Number Entity
          default: ""
          selector:
            entity:
              domain: number
        mammotion_path_spacing:
          name: Path Spacing (cm)
          default: 12
          selector:
            number:
              min: 8
              max: 30
              step: 1
              unit_of_measurement: cm
              mode: slider

        start_progress_number_entity:
          name: Start Progress Number Entity (optional)
          default: ""
          selector:
            entity:
              domain: number
        mammotion_start_progress:
          name: Start Progress (%)
          default: 0
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        cutter_speed_select_entity:
          name: Cutter Speed Select Entity
          default: ""
          selector:
            entity:
              domain: select
        cutter_speed_option:
          name: Cutter Speed Option
          default: "fast"
          selector:
            select:
              options:
                - label: "normal"
                  value: "normal"
                - label: "slow"
                  value: "slow"
                - label: "fast"
                  value: "fast"

        cutting_path_mode_select_entity:
          name: Cutting Path Mode Select Entity
          default: ""
          selector:
            entity:
              domain: select
        cutting_path_mode_option:
          name: Cutting Path Mode Option
          default: "single_grid"
          selector:
            select:
              options:
                - label: "single_grid"
                  value: "single_grid"
                - label: "double_grid"
                  value: "double_grid"
                - label: "segment_grid"
                  value: "segment_grid"
                - label: "no_grid"
                  value: "no_grid"

        cutting_path_angle_mode_select_entity:
          name: Cutting Path Angle Mode Select Entity
          default: ""
          selector:
            entity:
              domain: select
        cutting_path_angle_mode_option:
          name: Cutting Path Angle Mode Option
          default: "relative_angle"
          selector:
            select:
              options:
                - label: "relative_angle"
                  value: "relative_angle"
                - label: "absolute_angle"
                  value: "absolute_angle"
                - label: "random_angle"
                  value: "random_angle"

        mow_order_select_entity:
          name: Mow Order Select Entity
          default: ""
          selector:
            entity:
              domain: select
        mow_order_option:
          name: Mow Order Option
          default: "border_first"
          selector:
            select:
              options:
                - label: "border_first"
                  value: "border_first"
                - label: "grid_first"
                  value: "grid_first"

        no_go_laps_select_entity:
          name: No-go Zone Mowing Laps Select Entity
          default: ""
          selector:
            entity:
              domain: select
        no_go_laps_option:
          name: No-go Zone Mowing Laps Option
          default: "one"
          selector:
            select:
              options:
                - label: "none"
                  value: "none"
                - label: "one"
                  value: "one"
                - label: "two"
                  value: "two"
                - label: "three"
                  value: "three"
                - label: "four"
                  value: "four"

        obstacle_avoidance_select_entity:
          name: Obstacle Avoidance Mode Select Entity
          default: ""
          selector:
            entity:
              domain: select
        obstacle_avoidance_option:
          name: Obstacle Avoidance Option
          default: "no_touch"
          selector:
            select:
              options:
                - label: "direct_touch"
                  value: "direct_touch"
                - label: "no_touch"
                  value: "no_touch"
                - label: "sensitive"
                  value: "sensitive"

        perimeter_laps_select_entity:
          name: Perimeter Mowing Laps Select Entity
          default: ""
          selector:
            entity:
              domain: select
        perimeter_laps_option:
          name: Perimeter Mowing Laps Option
          default: "two"
          selector:
            select:
              options:
                - label: "none"
                  value: "none"
                - label: "one"
                  value: "one"
                - label: "two"
                  value: "two"
                - label: "three"
                  value: "three"
                - label: "four"
                  value: "four"

        traversal_mode_select_entity:
          name: Traversal Mode Select Entity
          default: ""
          selector:
            entity:
              domain: select
        traversal_mode_option:
          name: Traversal Mode Option
          default: "follow_perimeter"
          selector:
            select:
              options:
                - label: "direct"
                  value: "direct"
                - label: "follow_perimeter"
                  value: "follow_perimeter"

        turnaround_mode_select_entity:
          name: Turnaround Mode Select Entity
          default: ""
          selector:
            entity:
              domain: select
        turnaround_mode_option:
          name: Turnaround Mode Option
          default: "zero_turn"
          selector:
            select:
              options:
                - label: "zero_turn"
                  value: "zero_turn"
                - label: "multipoint"
                  value: "multipoint"

        wildlife_safety_select_entity:
          name: Wildlife Safety Select Entity
          default: ""
          selector:
            entity:
              domain: select
        wildlife_safety_option:
          name: Wildlife Safety Option
          default: "low_speed_mowing"
          selector:
            select:
              options:
                - label: "off"
                  value: "off"
                - label: "stop_mowing"
                  value: "stop_mowing"
                - label: "low_speed_mowing"
                  value: "low_speed_mowing"

        night_light_switch_entity:
          name: Auto Lighting / Night Light Switch Entity
          default: ""
          selector:
            entity:
              domain: switch
        rain_detection_during_mow_switch_entity:
          name: Rain Detection During Mow Switch Entity
          default: ""
          selector:
            entity:
              domain: switch
        rain_detection_mower_switch_entity:
          name: Mower Rain Detection Switch Entity
          default: ""
          selector:
            entity:
              domain: switch

trigger:
  - platform: time
    at: !input mow_time_1
    id: session_1
  - platform: time
    at: !input mow_time_2
    id: session_2
  - platform: time
    at: !input mow_time_3
    id: session_3
  - platform: time
    at: !input mow_time_4
    id: session_4
  - platform: state
    entity_id: !input manual_start_button
    id: manual_start

mode: single
max_exceeded: silent

variables:
  mower_entity: !input mower_entity
  mower_display_name: !input mower_display_name
  manual_start_button: !input manual_start_button
  mower_last_error_sensor: !input mower_last_error_sensor
