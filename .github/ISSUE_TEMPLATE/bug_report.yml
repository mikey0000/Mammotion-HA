name: Report an issue with the Mammotion Integration
description: Report an issue with the Mammotion Integration.
body:
  - type: textarea
    validations:
      required: true
    attributes:
      label: The problem
      description: >-
        Describe the issue you are experiencing here, to communicate to the
        maintainers. Tell us what you were trying to do and what happened.

        Provide a clear and concise description of what the problem is.
  - type: dropdown
    id: robot
    validations:
      required: true
    attributes:
      label: What Mammotion device are you using?
      description: >
        Pick the exact SKU printed on your box / shown in the Mammotion app.
        Variant suffixes follow Mammotion's product line:
        **H** = with UltraSense AI Vision, **X** = with 4G/cellular,
        **HX** = both AI Vision and 4G.
        If your model isn't listed, choose "Other / not listed" and put the
        full model name in the description above.
      options:
        - Luba 1 AWD 1000
        - Luba 1 AWD 3000
        - Luba 1 AWD 5000
        - Luba 2 AWD 1000
        - Luba 2 AWD 1000H
        - Luba 2 AWD 3000
        - Luba 2 AWD 3000H
        - Luba 2 AWD 3000X
        - Luba 2 AWD 3000HX
        - Luba 2 AWD 5000
        - Luba 2 AWD 5000H
        - Luba 2 AWD 5000X
        - Luba 2 AWD 5000HX
        - Luba 2 AWD 10000
        - Luba 2 AWD 10000H
        - Luba 2 AWD 10000X
        - Luba 2 AWD 10000HX
        - Luba 3 AWD 1500
        - Luba 3 AWD 1500H
        - Luba 3 AWD 3000
        - Luba 3 AWD 3000H
        - Luba 3 AWD 5000
        - Luba 3 AWD 5000H
        - Luba mini AWD 800
        - Luba mini AWD 800H
        - Luba mini AWD 1500
        - Luba mini AWD 1500H
        - Luba mini AWD LiDAR
        - Luba mini 2 AWD 1500
        - Luba mini 2 AWD 1500H
        - Yuka 1000
        - Yuka 2000
        - Yuka 3000
        - Yuka mini 500
        - Yuka mini 500H
        - Yuka mini 600
        - Yuka mini 600H
        - Yuka mini 700
        - Yuka mini 700H
        - Yuka mini 800
        - Yuka mini 800H
        - Yuka mini 2 500
        - Yuka mini 2 600
        - Yuka mini 2 800
        - Yuka mini 2 1000
        - Yuka mini 2 1000H
        - Spino E1
        - Spino S1 Pro
        - Other / not listed (specify in description)
  - type: dropdown
    id: integration_version
    validations:
      required: true
    attributes:
      label: What version of the Mammotion integration are you using?
      description: >
        Pick the exact version installed on your Home Assistant.  If you are
        on a version older than those listed, choose "Older / not listed" and
        include the version (or the commit SHA from `manifest.json`'s
        `version` field) in the description above.  Do **not** select a newer
        version than what you actually have installed.
      # BEGIN AUTO-GENERATED VERSION LIST (refreshed by .github/workflows/update-issue-template.yml — do not hand-edit)
      options:
        - v0.6.3
        - v0.6.3-beta2
        - v0.6.3-beta1
        - v0.6.2
        - v0.6.2-beta1
        - v0.6.1
        - v0.6.0
        - v0.5.48-beta15
        - v0.5.48-beta14
        - v0.5.48-beta13
        - v0.5.48-beta12
        - v0.5.48-beta11
        - v0.5.48-beta10
        - v0.5.48-beta9
        - v0.5.48-beta8
        - v0.5.48-beta7
        - v0.5.48-beta6
        - v0.5.48-beta5
        - v0.5.48-beta4
        - v0.5.48-beta3
        - Older / not listed (specify in description)
      # END AUTO-GENERATED VERSION LIST
  - type: input
    id: ha_version
    validations:
      required: true
    attributes:
      label: What version of Home Assistant Core are you running?
      placeholder: core-
      description: >
        Can be found in: [Settings ⇒ System ⇒ Repairs ⇒ Three Dots in Upper Right ⇒ System information](https://my.home-assistant.io/redirect/system_health/).

        [![Open your Home Assistant instance and show the system information.](https://my.home-assistant.io/badges/system_health.svg)](https://my.home-assistant.io/redirect/system_health/)
